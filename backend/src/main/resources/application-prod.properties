# ============================================================
# PRODUCTION PROFILE – All sensitive values from env variables
# Set these in Railway > Variables panel
# ============================================================

# Database Configuration for Production
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Flyway Migration Validation
spring.flyway.validate-on-migrate=false

# JWT Configuration (15 Minutes Expiration for Prod)
app.jwtSecret=${JWT_SECRET:ChangeThisSecretToAStrongValueSuperLongKeyForSWP391ParkingProject2026Compliant}
app.jwtExpirationMs=900000

# ── VNPay Sandbox Credentials ──────────────────────────────
# Set VNP_TMN_CODE and VNP_HASH_SECRET in Railway Variables
# VNP_RETURN_URL must point to your deployed frontend domain, e.g.:
#   VNP_RETURN_URL=https://your-frontend.up.railway.app/payment-success
vnp.tmncode=${VNP_TMN_CODE:2QXUI4J4}
vnp.hashsecret=${VNP_HASH_SECRET}
vnp.returnurl=${VNP_RETURN_URL:https://your-frontend.up.railway.app/payment-success}
vnp.payurl=${VNP_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnp.apiurl=${VNP_API_URL:https://sandbox.vnpayment.vn/merchant_webapi/api.html}

# ── MoMo Sandbox Credentials ───────────────────────────────
# Set MOMO_ACCESS_KEY and MOMO_SECRET_KEY in Railway Variables
# MOMO_IPN_URL must point to your deployed backend, e.g.:
#   MOMO_IPN_URL=https://your-backend.up.railway.app/api/v1/momo/momo-ipn
momo.access-key=${MOMO_ACCESS_KEY}
momo.secret-key=${MOMO_SECRET_KEY}
momo.partner-code=${MOMO_PARTNER_CODE:MOMOBKUN20180810}
momo.endpoint=${MOMO_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api/create}
momo.redirect-url=${MOMO_REDIRECT_URL:https://your-frontend.up.railway.app/payment-success}
momo.ipn-url=${MOMO_IPN_URL:https://your-backend.up.railway.app/api/v1/momo/momo-ipn}
