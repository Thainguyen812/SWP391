# Database Configuration for Production
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:parking_db}
spring.datasource.username=${DB_USER:parking_user}
spring.datasource.password=${DB_PASSWORD}

# Flyway Migration Validation
spring.flyway.validate-on-migrate=true

# JWT Configuration (15 Minutes Expiration for Prod)
app.jwtSecret=${JWT_SECRET}
app.jwtExpirationMs=900000

# VNPay Credentials
vnp.hashsecret=${VNP_HASH_SECRET}

# MoMo Credentials
momo.secret-key=${MOMO_SECRET_KEY}
momo.access-key=${MOMO_ACCESS_KEY}
