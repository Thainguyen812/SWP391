spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/parking_db}
spring.datasource.username=${DATABASE_USERNAME:parking_user}
spring.datasource.password=${DATABASE_PASSWORD:ParkingDB@2024!}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.repair=true
spring.flyway.clean-on-validation-error=false
spring.flyway.clean-disabled=true
spring.flyway.validate-on-migrate=false

# Render/Railway provides PORT env var
server.port=${PORT:8080}
# JWT Configuration
app.jwtSecret=${JWT_SECRET:ChangeThisSecretToAStrongValueSuperLongKeyForSWP391ParkingProject2026Compliant}
app.jwtExpirationMs=864000000
app.refreshExpirationSec=604800000

