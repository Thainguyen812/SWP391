spring.datasource.url=jdbc:mysql://localhost:3306/parking_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
server.port=8080

# JWT
#app.jwtSecret=ChangeThisSecretToAStrongValue
app.jwtSecret=mySecretKey123456789012345678901234567890
app.jwtExpirationMs=900000  # 15 minutes
app.refreshExpirationSec=604800 # 7 days
