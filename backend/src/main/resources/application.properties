spring.datasource.url=jdbc:postgresql://localhost:5433/parking_db
spring.datasource.username=parking_user
spring.datasource.password=ParkingDB@2024!
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.repair=true
spring.flyway.clean-on-validation-error=false
spring.flyway.clean-disabled=true

server.port=8080
# JWT Configuration (Ghi chú phải nằm riêng một dòng như thế này)
app.jwtSecret=ChangeThisSecretToAStrongValueSuperLongKeyForSWP391ParkingProject2026Compliant
app.jwtExpirationMs=864000000
app.refreshExpirationSec=604800000

# Timezone Configuration (GMT+7 for Vietnam)
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

