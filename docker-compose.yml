version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: parking_db
    environment:
      POSTGRES_USER: parking_user
      POSTGRES_PASSWORD: ParkingDB@2024!
      POSTGRES_DB: parking_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      network: host
    container_name: parking_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=parking_db
      - DB_USER=parking_user
      - DB_PASSWORD=ParkingDB@2024!
      - JWT_SECRET=Th1sIsMySup3rS3cr3tKeyF0rJWTS1gn1ngAndItMustB3AtL3ast256B1tsLong!
      - VNP_HASH_SECRET=GR97B6X3H8X1Z2C3V4B5N6M7K8L9Q0W1
      - MOMO_SECRET_KEY=demoSecretKey
      - MOMO_ACCESS_KEY=demoAccessKey
      - MAIL_HOST=${MAIL_HOST:-maildev}
      - MAIL_PORT=${MAIL_PORT:-1025}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_SMTP_AUTH=${MAIL_SMTP_AUTH:-false}
      - MAIL_SMTP_STARTTLS=${MAIL_SMTP_STARTTLS:-false}
    depends_on:
      - postgres
      - maildev
    restart: unless-stopped

  maildev:
    image: maildev/maildev
    container_name: parking_maildev
    ports:
      - "1080:1080"
      - "1025:1025"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      network: host
    container_name: parking_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: parking_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json
      - ./pgadmin/pgpass:/pgadmin4/pgpass
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
