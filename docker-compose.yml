version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: parking_db
    environment:
      POSTGRES_USER: parking_user
      POSTGRES_PASSWORD: ParkingDB@2024!
      POSTGRES_DB: parking_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      network: host
    container_name: parking_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/parking_db
      - SPRING_DATASOURCE_USERNAME=parking_user
      - SPRING_DATASOURCE_PASSWORD=ParkingDB@2024!
      - MAIL_HOST=${MAIL_HOST:-maildev}
      - MAIL_PORT=${MAIL_PORT:-1025}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_SMTP_AUTH=${MAIL_SMTP_AUTH:-false}
      - MAIL_SMTP_STARTTLS=${MAIL_SMTP_STARTTLS:-false}
    depends_on:
      - postgres
      - maildev
    restart: unless-stopped

  maildev:
    image: maildev/maildev
    container_name: parking_maildev
    ports:
      - "1080:1080"
      - "1025:1025"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      network: host
    container_name: parking_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
