version: "3.8"
services:
  postgres:
    image: postgres:15-alpine
    container_name: parking_db
    environment:
      POSTGRES_USER: parking_user
      POSTGRES_PASSWORD: ParkingDB@2024!
      POSTGRES_DB: parking_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
